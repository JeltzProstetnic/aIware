# Push filter config for aIware
# Used by: ~/cfg-agent-fleet/setup/scripts/filtered-push.sh
#
# Private gets everything. Public excludes paths below.

private_remote=private
public_remote=origin
branch=main

# Directories excluded from public
exclude=tmp
exclude=drafts
exclude=scripts
exclude=docs

# Individual files excluded from public
exclude=.push-filter.conf
exclude=session-context.md
exclude=pop-sci/video-script.md
exclude=pop-sci/podcast-script.md
exclude=pop-sci/linkedin-post.md
exclude=pop-sci/magazine-article.md
exclude=pop-sci/magazine-article.html
exclude=pop-sci/book-outline-expanded.md
exclude=pop-sci/perplexity-review.md

# Glob patterns excluded from public (book manuscript & build artifacts)
exclude_glob=pop-sci/book-manuscript*
exclude_glob=pop-sci/isbn-barcode*
